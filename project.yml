name: Bricky
options:
  bundleIdPrefix: com.bricky
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.2"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "1.4.0"
    CURRENT_PROJECT_VERSION: "5"
    DEVELOPMENT_TEAM: "6UN3X7Q6SP"
    # Xcode 16 recommended settings
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CLANG_WARN_QUOTED_INCLUDE_IN_FRAMEWORK_HEADER: YES
    LOCALIZATION_PREFERS_STRING_CATALOGS: YES
    GCC_WARN_UNGUARDED_AVAILABILITY: YES_AGGRESSIVE
    CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: YES
    CLANG_WARN_STRICT_PROTOTYPES: YES
    CLANG_WARN_COMMA: YES
    CLANG_WARN_NON_LITERAL_NULL_CONVERSION: YES
    CLANG_WARN_OBJC_LITERAL_CONVERSION: YES
    CLANG_WARN_RANGE_LOOP_ANALYSIS: YES
    ENABLE_STRICT_OBJC_MSGSEND: YES

targets:
  Bricky:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Bricky
        excludes:
          - "Resources/LDraw"
      - path: Bricky/Resources/LDraw
        buildPhase: resources
        optional: true
        type: folder
    settings:
      base:
        INFOPLIST_FILE: Bricky/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.bricky.app
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_ENTITLEMENTS: Bricky/Resources/App.entitlements
    info:
      path: Bricky/Resources/Info.plist
      properties:
        NSCameraUsageDescription: "This app needs camera access to scan and identify your LEGO pieces."
        NSPhotoLibraryUsageDescription: "This app needs photo library access to import images of your LEGO pieces."
        NSLocationWhenInUseUsageDescription: "This app tags your scans with where you found pieces so you can find them later — like 'at my friend's house.' Coordinates are stored only on your device."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortraitUpsideDown
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UILaunchScreen:
          UIColorName: AccentColor
          UIImageName: AppIcon
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - bricky
            CFBundleURLName: com.bricky.auth

  BrickyTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: BrickyTests
    dependencies:
      - target: Bricky
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bricky.tests
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Bricky.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Bricky"
        BUNDLE_LOADER: "$(TEST_HOST)"

  BrickyUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: BrickyUITests
    dependencies:
      - target: Bricky
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bricky.uitests
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: Bricky
